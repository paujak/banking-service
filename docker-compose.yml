services:
  banking-db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-banking_service}
      MYSQL_USER: ${DB_USERNAME:-banking_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-banking_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - banking-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  banking-db-data:
