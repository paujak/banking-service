spring:
  application:
    name: banking-service
  datasource:
    url: "jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:banking_service}"
    username: ${DB_USERNAME:banking_app}
    password: ${DB_PASSWORD:changeme}
    hikari:
      initialization-fail-timeout: 120000
      connection-timeout: 30000
      keepalive-time: 60000
      maximum-pool-size: 5
      data-source-properties:
        sslMode: REQUIRED
        trustCertificateKeyStoreUrl: ${SSL_TRUSTSTORE_PATH:classpath:ssl/test-truststore.jks}
        trustCertificateKeyStorePassword: ${SSL_TRUSTSTORE_PASSWORD:changeit}
        trustCertificateKeyStoreType: JKS
        tlsVersions: TLSv1.2,TLSv1.3
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  ssl:
    bundle:
      jks:
        banking-server:
          key:
            alias: ${SSL_KEY_ALIAS:banking-service}
          keystore:
            location: ${SSL_KEYSTORE_PATH:classpath:ssl/test-keystore.jks}
            password: ${SSL_KEYSTORE_PASSWORD:changeit}
            type: JKS
          truststore:
            location: ${SSL_TRUSTSTORE_PATH:classpath:ssl/test-truststore.jks}
            password: ${SSL_TRUSTSTORE_PASSWORD:changeit}
            type: JKS

management:
  endpoints:
    web:
      exposure:
        include: health
      discovery:
        enabled: false
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: false

logging:
  level:
    org.hibernate.orm.connections.pooling: WARN
    
banking-service:
  account:
    withdrawal:
      external-service:
        url: ${DEBIT_CHECK_URL:https://5c3e37d3-c2fb-47e6-997b-6fd731899fa9.mock.pstmn.io/log-event}

# HTTPS — port 8443 only. No plain HTTP connector is configured.
server:
  port: 8443
  ssl:
    enabled: true
    bundle: banking-server

