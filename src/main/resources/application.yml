spring:
  application:
    name: banking-service
  datasource:
    url: "jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      initialization-fail-timeout: 120000
      connection-timeout: 30000
      keepalive-time: 60000
      maximum-pool-size: 5
      data-source-properties:
        sslMode: REQUIRED
        trustCertificateKeyStoreUrl: ${SSL_TRUSTSTORE_PATH}
        trustCertificateKeyStorePassword: ${SSL_TRUSTSTORE_PASSWORD}
        trustCertificateKeyStoreType: JKS
        tlsVersions: TLSv1.2,TLSv1.3
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  ssl:
    bundle:
      jks:
        banking-server:
          key:
            alias: ${SSL_KEY_ALIAS}
          keystore:
            location: ${SSL_KEYSTORE_PATH}
            password: ${SSL_KEYSTORE_PASSWORD}
            type: JKS
          truststore:
            location: ${SSL_TRUSTSTORE_PATH}
            password: ${SSL_TRUSTSTORE_PASSWORD}
            type: JKS

management:
  endpoints:
    web:
      exposure:
        include: health
      discovery:
        enabled: false
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: false

logging:
  level:
    org.hibernate.orm.connections.pooling: WARN
    
banking-service:
  account:
    withdrawal:
      external-service:
        url: ${DEBIT_CHECK_URL}

# HTTPS — port 8443 only. No plain HTTP connector is configured.
server:
  port: 8443
  ssl:
    enabled: true
    bundle: banking-server

