# Test profile — base shared config for all integration tests.
# SSL bundle is re-pointed to classpath test keystores so Spring can initialize
# it without needing files on disk. Server SSL remains disabled for non-TLS tests;
# application-test-tls.yml enables it for TlsConnectivityIT.

server:
  port: 0
  ssl:
    enabled: false

# Override SSL bundle to use classpath keystores generated by scripts/generate-certs.sh.
# This allows SslAutoConfiguration to initialize without file-not-found errors.
spring:
  ssl:
    bundle:
      jks:
        banking-server:
          key:
            alias: banking-service
          keystore:
            location: classpath:ssl/test-keystore.jks
            password: changeit
            type: JKS
          truststore:
            location: classpath:ssl/test-truststore.jks
            password: changeit
            type: JKS

# Placeholder values satisfy RequiredEnvVarsPostProcessor and BankingProperties @Validated.
# Testcontainers @ServiceConnection overrides spring.datasource.* at runtime.
DB_USERNAME: test_user
DB_PASSWORD: test_password
SSL_KEYSTORE_PATH: /tmp/test-keystore.jks
SSL_KEYSTORE_PASSWORD: changeit
SSL_TRUSTSTORE_PATH: /tmp/test-truststore.jks
SSL_TRUSTSTORE_PASSWORD: changeit
